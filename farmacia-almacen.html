<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén Farmacia — Control de Stock</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --border: #c8cfd8;
    --border-dark: #8a9ab0;
    --accent: #1a3a5c;
    --accent2: #2563a8;
    --highlight: #e8f0fc;
    --highlight2: #d0e4ff;
    --green: #0d7a4e;
    --green-bg: #e6f5ef;
    --red: #b91c1c;
    --red-bg: #fee2e2;
    --yellow: #92400e;
    --yellow-bg: #fef3c7;
    --text: #1a2433;
    --text2: #4a5568;
    --text3: #8a9ab0;
    --zone-empty: #f7f9fc;
    --zone-hover: #dbeafe;
    --zone-active: #bfdbfe;
    --zone-filled: #dcfce7;
    --zone-selected: #1a3a5c;
    --radius: 6px;
    --shadow: 0 2px 8px rgba(26,58,92,0.10);
    --shadow-lg: 0 8px 32px rgba(26,58,92,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 0 32px;
    height: 58px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #fff;
    white-space: nowrap;
  }
  header .logo span { color: #7ab8f5; }
  header .sep { flex: 1; }
  header .subtitle {
    font-size: 0.78rem;
    color: #a8c4e0;
    letter-spacing: 0.04em;
  }

  .main-layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* LEFT: Warehouse map */
  .map-panel {
    padding: 28px 24px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .warehouse-container {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 20px;
    position: relative;
  }

  /* SVG-based warehouse floor plan */
  .warehouse-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .zone-rect {
    fill: var(--zone-empty);
    stroke: var(--accent);
    stroke-width: 1.5;
    cursor: pointer;
    transition: fill 0.15s, stroke-width 0.15s;
    rx: 3;
  }
  .zone-rect:hover { fill: var(--zone-hover); stroke-width: 2.5; }
  .zone-rect.has-items { fill: var(--zone-filled); }
  .zone-rect.selected { fill: var(--zone-active); stroke: var(--accent2); stroke-width: 3; }

  .zone-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    fill: var(--accent);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }
  .zone-count {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 8px;
    fill: var(--green);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    user-select: none;
  }

  .casonera-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    fill: var(--accent);
    writing-mode: tb;
    text-anchor: middle;
    pointer-events: none;
    letter-spacing: 0.12em;
  }

  /* RIGHT: Sidebar */
  .sidebar {
    background: var(--surface);
    border-left: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 58px);
    position: sticky;
    top: 58px;
    overflow: hidden;
  }

  /* Search section */
  .search-section {
    padding: 20px 20px 14px;
    border-bottom: 1.5px solid var(--border);
    background: var(--highlight);
  }
  .search-section .panel-title { margin-bottom: 10px; }

  .search-box {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent2); }
  .search-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    transition: background 0.15s;
  }
  .search-box button:hover { background: var(--accent2); }

  .search-results {
    margin-top: 10px;
    max-height: 140px;
    overflow-y: auto;
  }
  .search-result-item {
    padding: 7px 10px;
    border-radius: 4px;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .search-result-item:hover { background: var(--highlight2); }
  .search-result-item .item-name { font-weight: 500; color: var(--text); }
  .search-result-item .item-code { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text3); }
  .search-result-item .item-zone {
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .search-no-results { font-size: 0.8rem; color: var(--text3); padding: 6px 10px; font-style: italic; }

  /* Zone detail section */
  .zone-detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .zone-header {
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface);
  }
  .zone-header .zone-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .zone-header .zone-subtitle { font-size: 0.76rem; color: var(--text3); margin-top: 2px; }
  .zone-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 8px;
    padding: 20px;
  }
  .zone-placeholder svg { opacity: 0.3; }
  .zone-placeholder p { font-size: 0.82rem; text-align: center; }

  /* Add item form */
  .add-form {
    padding: 14px 20px;
    border-bottom: 1.5px solid var(--border);
    background: var(--green-bg);
    display: none;
  }
  .add-form.visible { display: block; }
  .add-form .form-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
  }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-row input {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    padding: 7px 10px;
    border: 1.5px solid #a7d3b8;
    border-radius: var(--radius);
    background: #fff;
    color: var(--text);
    outline: none;
    min-width: 0;
  }
  .form-row input:focus { border-color: var(--green); }
  .form-row input::placeholder { color: var(--text3); }
  .btn-add {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 7px 16px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: #0a6040; }

  /* Items list */
  .items-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px 16px;
    display: none;
  }
  .items-list.visible { display: block; }

  .item-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 7px;
    background: #fff;
    transition: border-color 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .item-card:hover { border-color: var(--accent2); box-shadow: var(--shadow); }
  .item-card .item-info { flex: 1; min-width: 0; }
  .item-card .item-n { font-weight: 600; font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card .item-c { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text3); }
  .item-card .btn-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  .item-card .btn-del:hover { color: var(--red); background: var(--red-bg); }

  .items-empty {
    color: var(--text3);
    font-size: 0.8rem;
    text-align: center;
    margin-top: 20px;
    font-style: italic;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--text2);
  }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid var(--accent);
    flex-shrink: 0;
  }
  .legend-dot.empty { background: var(--zone-empty); }
  .legend-dot.filled { background: var(--zone-filled); border-color: var(--green); }
  .legend-dot.selected { background: var(--zone-active); border-color: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-dark); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 0.82rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s cubic-bezier(.22,1,.36,1), opacity 0.3s;
    opacity: 0;
    z-index: 9999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; border-left: none; border-top: 1.5px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FARMA<span>STOCK</span></div>
  <div class="sep"></div>
  <div class="subtitle">Sistema de Control de Almacén</div>
</header>

<div class="main-layout">
  <!-- MAP PANEL -->
  <div class="map-panel">
    <div class="panel-title">Plano del Almacén</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot empty"></div> Zona vacía</div>
      <div class="legend-item"><div class="legend-dot filled"></div> Con artículos</div>
      <div class="legend-item"><div class="legend-dot selected"></div> Seleccionada</div>
    </div>
    <div class="warehouse-container">
      <!-- SVG Floor Plan matching the uploaded image layout -->
      <svg class="warehouse-svg" viewBox="0 0 620 780" xmlns="http://www.w3.org/2000/svg">

        <!-- Outer border -->
        <rect x="2" y="2" width="616" height="776" fill="none" stroke="#1a3a5c" stroke-width="2.5" rx="4"/>

        <!-- ===== RIGHT COLUMN: Zones 1–9 ===== -->
        <!-- Zone 1 -->
        <rect class="zone-rect" id="zone-1" x="468" y="680" width="144" height="54" rx="3" data-zone="1"/>
        <text class="zone-label" x="540" y="707">1</text>
        <text class="zone-count" id="count-1" x="540" y="722"></text>

        <!-- Zone 2 -->
        <rect class="zone-rect" id="zone-2" x="468" y="622" width="144" height="54" rx="3" data-zone="2"/>
        <text class="zone-label" x="540" y="649">2</text>
        <text class="zone-count" id="count-2" x="540" y="664"></text>

        <!-- Zone 3 -->
        <rect class="zone-rect" id="zone-3" x="468" y="564" width="144" height="54" rx="3" data-zone="3"/>
        <text class="zone-label" x="540" y="591">3</text>
        <text class="zone-count" id="count-3" x="540" y="606"></text>

        <!-- Zone 4 -->
        <rect class="zone-rect" id="zone-4" x="468" y="500" width="144" height="60" rx="3" data-zone="4"/>
        <text class="zone-label" x="540" y="530">4</text>
        <text class="zone-count" id="count-4" x="540" y="546"></text>

        <!-- Zone 5 (right sub) -->
        <rect class="zone-rect" id="zone-5" x="468" y="424" width="144" height="72" rx="3" data-zone="5"/>
        <text class="zone-label" x="540" y="460">5</text>
        <text class="zone-count" id="count-5" x="540" y="476"></text>

        <!-- Zone 5 (left annex) -->
        <rect class="zone-rect" id="zone-5b" x="370" y="424" width="90" height="72" rx="3" data-zone="5b"/>
        <text class="zone-label" x="415" y="460">5</text>
        <text class="zone-count" id="count-5b" x="415" y="476"></text>

        <!-- Zone 6 -->
        <rect class="zone-rect" id="zone-6" x="468" y="348" width="144" height="72" rx="3" data-zone="6"/>
        <text class="zone-label" x="540" y="384">6</text>
        <text class="zone-count" id="count-6" x="540" y="400"></text>

        <!-- Zone 7 -->
        <rect class="zone-rect" id="zone-7" x="468" y="272" width="144" height="72" rx="3" data-zone="7"/>
        <text class="zone-label" x="540" y="308">7</text>
        <text class="zone-count" id="count-7" x="540" y="324"></text>

        <!-- Zone 8 -->
        <rect class="zone-rect" id="zone-8" x="468" y="196" width="144" height="72" rx="3" data-zone="8"/>
        <text class="zone-label" x="540" y="232">8</text>
        <text class="zone-count" id="count-8" x="540" y="248"></text>

        <!-- Zone 9 -->
        <rect class="zone-rect" id="zone-9" x="468" y="20" width="144" height="172" rx="3" data-zone="9"/>
        <text class="zone-label" x="540" y="106">9</text>
        <text class="zone-count" id="count-9" x="540" y="122"></text>

        <!-- ===== TOP: Zones 10, 11 ===== -->
        <!-- Zone 10 -->
        <rect class="zone-rect" id="zone-10" x="294" y="20" width="84" height="76" rx="3" data-zone="10"/>
        <text class="zone-label" x="336" y="58">10</text>
        <text class="zone-count" id="count-10" x="336" y="74"></text>

        <!-- Zone 11 -->
        <rect class="zone-rect" id="zone-11" x="210" y="20" width="80" height="76" rx="3" data-zone="11"/>
        <text class="zone-label" x="250" y="58">11</text>
        <text class="zone-count" id="count-11" x="250" y="74"></text>

        <!-- ===== LEFT COLUMN: CASONERA + Zones 12–17 ===== -->
        <!-- CASONERA vertical label strip -->
        <rect x="138" y="20" width="22" height="520" fill="#eef3f9" stroke="#1a3a5c" stroke-width="1.2"/>
        <text class="casonera-label" x="149" y="280" transform="rotate(-90,149,280)">CASONERA</text>

        <!-- Zone 12 -->
        <rect class="zone-rect" id="zone-12" x="20" y="20" width="114" height="130" rx="3" data-zone="12"/>
        <text class="zone-label" x="77" y="85">12</text>
        <text class="zone-count" id="count-12" x="77" y="101"></text>

        <!-- Zone 13 -->
        <rect class="zone-rect" id="zone-13" x="20" y="154" width="114" height="136" rx="3" data-zone="13"/>
        <text class="zone-label" x="77" y="222">13</text>
        <text class="zone-count" id="count-13" x="77" y="238"></text>

        <!-- Zone 14 -->
        <rect class="zone-rect" id="zone-14" x="20" y="294" width="114" height="60" rx="3" data-zone="14"/>
        <text class="zone-label" x="77" y="324">14</text>
        <text class="zone-count" id="count-14" x="77" y="340"></text>

        <!-- Zone 15 -->
        <rect class="zone-rect" id="zone-15" x="20" y="358" width="114" height="60" rx="3" data-zone="15"/>
        <text class="zone-label" x="77" y="388">15</text>
        <text class="zone-count" id="count-15" x="77" y="404"></text>

        <!-- Zone 16 -->
        <rect class="zone-rect" id="zone-16" x="20" y="422" width="114" height="60" rx="3" data-zone="16"/>
        <text class="zone-label" x="77" y="452">16</text>
        <text class="zone-count" id="count-16" x="77" y="468"></text>

        <!-- Zone 17 (thin) -->
        <rect class="zone-rect" id="zone-17" x="20" y="486" width="36" height="44" rx="3" data-zone="17"/>
        <text class="zone-label" x="38" y="508">17</text>
        <text class="zone-count" id="count-17" x="38" y="522"></text>

        <!-- ===== BOTTOM LEFT: Zones 18, 19 ===== -->
        <!-- Zone 18 -->
        <rect class="zone-rect" id="zone-18" x="42" y="560" width="96" height="72" rx="3" data-zone="18"/>
        <text class="zone-label" x="90" y="596">18</text>
        <text class="zone-count" id="count-18" x="90" y="612"></text>

        <!-- Zone 19 -->
        <rect class="zone-rect" id="zone-19" x="142" y="560" width="96" height="72" rx="3" data-zone="19"/>
        <text class="zone-label" x="190" y="596">19</text>
        <text class="zone-count" id="count-19" x="190" y="612"></text>

        <!-- ===== CENTER BOTTOM: Zones 20–23 ===== -->
        <!-- Zone 20 -->
        <rect class="zone-rect" id="zone-20" x="278" y="666" width="70" height="50" rx="3" data-zone="20"/>
        <text class="zone-label" x="313" y="691">20</text>
        <text class="zone-count" id="count-20" x="313" y="706"></text>

        <!-- Zone 21 -->
        <rect class="zone-rect" id="zone-21" x="352" y="666" width="70" height="50" rx="3" data-zone="21"/>
        <text class="zone-label" x="387" y="691">21</text>
        <text class="zone-count" id="count-21" x="387" y="706"></text>

        <!-- Zone 22 -->
        <rect class="zone-rect" id="zone-22" x="352" y="720" width="70" height="50" rx="3" data-zone="22"/>
        <text class="zone-label" x="387" y="745">22</text>
        <text class="zone-count" id="count-22" x="387" y="760"></text>

        <!-- Zone 23 -->
        <rect class="zone-rect" id="zone-23" x="278" y="730" width="144" height="46" rx="3" data-zone="23"/>
        <text class="zone-label" x="350" y="753">23</text>
        <text class="zone-count" id="count-23" x="350" y="768"></text>

      </svg>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- Search -->
    <div class="search-section">
      <div class="panel-title">Buscar Artículo</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Nombre o código nacional..." autocomplete="off"/>
        <button onclick="doSearch()">Buscar</button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Zone Detail -->
    <div class="zone-detail">
      <div class="zone-header" id="zoneHeader" style="display:none">
        <div class="zone-id" id="zoneIdDisplay">—</div>
        <div class="zone-subtitle" id="zoneSubtitle">0 artículos</div>
      </div>

      <div class="zone-placeholder" id="zonePlaceholder">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
        </svg>
        <p>Haz clic en una zona del plano para ver y gestionar sus artículos</p>
      </div>

      <div class="add-form" id="addForm">
        <div class="form-title">➕ Añadir artículo a Zona <span id="addFormZone"></span></div>
        <div class="form-row">
          <input type="text" id="itemName" placeholder="Nombre del artículo" autocomplete="off"/>
        </div>
        <div class="form-row">
          <input type="text" id="itemCode" placeholder="Código Nacional (opcional)" autocomplete="off" maxlength="20"/>
          <button class="btn-add" onclick="addItem()">Añadir</button>
        </div>
      </div>

      <div class="items-list" id="itemsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Data Store ──────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'farmastock_v1';
  let db = loadDB();
  let selectedZone = null;

  function loadDB() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return {};
  }
  function saveDB() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
  }
  function getZoneItems(zone) { return db[zone] || []; }
  function zoneKey(zone) { return String(zone); }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderMap() {
    document.querySelectorAll('.zone-rect').forEach(rect => {
      const z = rect.getAttribute('data-zone');
      const items = getZoneItems(z);
      const countEl = document.getElementById('count-' + z);
      if (items.length > 0) {
        rect.classList.add('has-items');
        if (countEl) countEl.textContent = items.length + ' art.';
      } else {
        rect.classList.remove('has-items');
        if (countEl) countEl.textContent = '';
      }
      if (z === selectedZone) rect.classList.add('selected');
      else rect.classList.remove('selected');
    });
  }

  function renderZoneDetail() {
    const header = document.getElementById('zoneHeader');
    const placeholder = document.getElementById('zonePlaceholder');
    const addForm = document.getElementById('addForm');
    const itemsList = document.getElementById('itemsList');

    if (!selectedZone) {
      header.style.display = 'none';
      placeholder.style.display = 'flex';
      addForm.classList.remove('visible');
      itemsList.classList.remove('visible');
      return;
    }

    const items = getZoneItems(selectedZone);
    header.style.display = 'block';
    placeholder.style.display = 'none';
    addForm.classList.add('visible');
    itemsList.classList.add('visible');

    document.getElementById('zoneIdDisplay').textContent = 'Zona ' + selectedZone;
    document.getElementById('zoneSubtitle').textContent = items.length + (items.length === 1 ? ' artículo' : ' artículos');
    document.getElementById('addFormZone').textContent = selectedZone;

    itemsList.innerHTML = '';
    if (items.length === 0) {
      itemsList.innerHTML = '<div class="items-empty">Sin artículos en esta zona.<br>Añade el primero.</div>';
    } else {
      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-info">
            <div class="item-n">${escHtml(item.name)}</div>
            <div class="item-c">${item.code ? 'CN: ' + escHtml(item.code) : '<em style="color:#aaa">Sin código</em>'}</div>
          </div>
          <button class="btn-del" onclick="deleteItem('${selectedZone}', ${idx})" title="Eliminar">✕</button>`;
        itemsList.appendChild(card);
      });
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Zone click ───────────────────────────────────────────────────────────────
  document.querySelectorAll('.zone-rect').forEach(rect => {
    rect.addEventListener('click', () => {
      const z = rect.getAttribute('data-zone');
      selectedZone = z;
      document.getElementById('itemName').value = '';
      document.getElementById('itemCode').value = '';
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('searchInput').value = '';
      renderMap();
      renderZoneDetail();
    });
  });

  // ── Add item ─────────────────────────────────────────────────────────────────
  function addItem() {
    if (!selectedZone) return;
    const name = document.getElementById('itemName').value.trim();
    const code = document.getElementById('itemCode').value.trim();
    if (!name) { showToast('Introduce el nombre del artículo', 'error'); return; }

    if (code) {
      for (const z in db) {
        const found = db[z].find(i => i.code && i.code.toLowerCase() === code.toLowerCase());
        if (found) {
          showToast(`CN ${code} ya existe en Zona ${z}: ${found.name}`, 'error');
          return;
        }
      }
    }

    if (!db[selectedZone]) db[selectedZone] = [];
    db[selectedZone].push({ name, code });
    saveDB();
    document.getElementById('itemName').value = '';
    document.getElementById('itemCode').value = '';
    showToast(`Artículo añadido a Zona ${selectedZone}`, 'success');
    renderMap();
    renderZoneDetail();
  }

  // Enter key on form
  document.getElementById('itemCode').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  document.getElementById('itemName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('itemCode').focus(); });

  // ── Delete item ───────────────────────────────────────────────────────────────
  function deleteItem(zone, idx) {
    if (!db[zone]) return;
    const item = db[zone][idx];
    db[zone].splice(idx, 1);
    if (db[zone].length === 0) delete db[zone];
    saveDB();
    showToast(`"${item.name}" eliminado`, '');
    renderMap();
    renderZoneDetail();
  }

  // ── Search ────────────────────────────────────────────────────────────────────
  function doSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const container = document.getElementById('searchResults');
    container.innerHTML = '';
    if (!q) return;

    const results = [];
    for (const z in db) {
      db[z].forEach(item => {
        if (item.name.toLowerCase().includes(q) || item.code.toLowerCase().includes(q)) {
          results.push({ zone: z, name: item.name, code: item.code });
        }
      });
    }

    if (results.length === 0) {
      container.innerHTML = '<div class="search-no-results">Sin resultados para "' + escHtml(q) + '"</div>';
      return;
    }

    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `
        <div>
          <div class="item-name">${escHtml(r.name)}</div>
          <div class="item-code">${r.code ? 'CN: ' + escHtml(r.code) : 'Sin código'}</div>
        </div>
        <span class="item-zone">Zona ${escHtml(r.zone)}</span>`;
      div.addEventListener('click', () => {
        selectedZone = r.zone;
        document.getElementById('itemName').value = '';
        document.getElementById('itemCode').value = '';
        renderMap();
        renderZoneDetail();
        // Scroll map into view on mobile
        document.querySelector('.warehouse-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
        showToast(`Zona ${r.zone} seleccionada`, 'success');
      });
      container.appendChild(div);
    });
  }

  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Toast ─────────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 2400);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  renderMap();
  renderZoneDetail();
</script>
</body>
</html>
